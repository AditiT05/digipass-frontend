<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – DigiPass</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff; /* White background */
      color: #333;
    }
    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #f8f8f8;
      border-bottom: 1px solid #ddd;
    }
    nav .logo {
      font-size: 30px;
      font-weight: bold;
      color: hsl(144, 71%, 3%);
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li {
      display: inline;
    }
    nav ul li a {
      color: #333;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    nav ul li a:hover {
      color: #2a5298;
    }
    /* Button look */
    .btn {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: #fff !important;
      padding: 10px 18px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      transition: background 0.4s, transform 0.2s;
    }
    .btn:hover {
      background: linear-gradient(45deg, #5a0fb9, #1e63e5);
      transform: translateY(-2px);
    }
    /* Contact Page */
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    h1,.contact-info h2,
    form label[for="name"]::before {
      text-align: center;
      margin-bottom: 30px;
      grid-column: span 2;
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-fill-color: transparent;
    }
    .contact-info {
      background: #f8f8f8;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .contact-info h2 {
      margin-top: 0;
      color: #2a5298;
    }
    .contact-info p {
      margin: 8px 0;
    }
    /* Form */
    form {
      display: flex;
      flex-direction: column;
    }
    form label {
      margin: 8px 0 4px;
      font-weight: bold;
    }
    form input, form textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    /* Match the gradient of the Login/Sign Up buttons */
    form button,
    form input[type="submit"] {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.3s ease;
}
    form button:hover,
    form input[type="submit"]:hover {
      opacity: 0.9; /* subtle hover effect */
}
    /* Map */
    .map {
      grid-column: span 2;
      margin-top: 20px;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 8px;
    }
    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background: #f8f8f8;
      border-top: 1px solid #ddd;
      font-size: 14px;
      margin-top: 50px;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav>
    <div class="logo">🚆 DigiPass</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html" class="btn">Login</a></li>
      <li><a href="signup.html" class="btn">Sign Up</a></li>
    </ul>
  </nav>
  <!-- Contact Page Content -->
  <div class="container">
    <h1>Contact Us</h1>
    <!-- Contact Info -->
    <div class="contact-info">
      <h2>Our Office</h2>
      <p><strong>Address:</strong> D. G. Ruparel College, Mumbai, India</p>
      <p><strong>Email:</strong> support@digipass.com</p>
      <p><strong>Phone:</strong> +91 98765 43210</p>
      <p><strong>Working Hours:</strong> Mon – Fri, 9:00 AM – 5:00 PM</p>
    </div>
    <!-- Contact Form -->
    <form>
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="Enter your name" required>
      <label for="email">Your Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
      <label for="message">Message</label>
      <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <!-- Map -->
    <div class="map">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3770.8203997330504!2d72.8374513149007!3d19.02219768711842!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7cee66c26b8df%3A0x97e6eaa8b36805b9!2sD.%20G.%20Ruparel%20College%20of%20Arts%2C%20Science%20and%20Commerce!5e0!3m2!1sen!2sin!4v1676992123456"
        allowfullscreen="" loading="lazy">
      </iframe>
    </div>
  </div>

<script>
const form = document.querySelector('form');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const message = document.getElementById('message').value;
  try {
    const res = await fetch('https://digipass-backend-yyvx.onrender.com/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, message })
    });
    const data = await res.json();
    alert(data.message);
    if (data.success) {
      form.reset();  // clear the form
    }
  } catch (err) {
    console.error(err);
    alert('Something went wrong. Please try again.');
  }
});
</script>
  <!-- Footer -->
  <footer>
    © 2025 DigiPass | D.G. Ruparel College
  </footer>
</body>
</html>
