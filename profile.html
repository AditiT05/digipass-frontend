<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Profile – DigiPass</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #f8f8f8;
      border-bottom: 1px solid #ddd;
    }
    nav .logo {
      font-size: 20px;
      font-weight: bold;
      color: hsl(144, 71%, 3%);
    }
    nav ul {
      list-style: none; 
      display: flex;
      gap: 20px;
      margin: 0; 
      padding: 0;
    }
    nav ul li a { 
      color: #333;
      text-decoration: none; 
      font-weight: bold;
      transition: 0.3s; 
    }
    nav ul li a:hover { 
      color: #2a5298;
    }
    /* Profile Container */
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    h1 { 
    text-align: center; 
    margin-bottom: 20px;
    /* Purple–blue gradient text */
    background: linear-gradient(45deg, #6a11cb, #2575fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text; /* for other browsers */
    color: transparent;
   }


    /* Form */
    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    label { 
      font-weight: bold;
      margin-bottom: 5px; 
      display: block;
    }
    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
    }
    .full-width { 
    grid-column: span 2;
   }
    button {
      background: linear-gradient(45deg, #6a11cb, #2575fc); /* same as login/signup */
      color: #fff;
      padding: 10px 24px;          /* smaller than full-width */
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin-top: 20px;
      /* Center in grid */
      grid-column: span 2;       /* spans full width of 2 columns */
      justify-self: center;       /* centers the button horizontally */
      transition: background 0.3s ease, transform 0.2s ease;
    }
    button:hover { 
      background: linear-gradient(45deg, #5a0fb9, #1e63e5);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #f8f8f8;
      border-top: 1px solid #ddd;
      font-size: 14px;
      margin-top: 40px;
    }
    #msg{
    max-width: 600px;
    margin: 12px auto;
    padding: 12px 16px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    background: #f8fafc;
    border: 1px solid #e6eef6;
    font-family: Arial, sans-serif;
    color: #0f172a;
    font-size: 15px;
  }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">🚆 DigiPass | Student Profile</div>
    <ul>
      <li><a href="student-dashboard.html">Dashboard</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
  </nav>

  <!-- Profile Container -->
  <div class="container">
    <h1>My Profile</h1>

    
    <!-- Profile Form -->
    <form id="profileForm">
      <div>
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
      </div>
      <div>
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" required>
      </div>
      <div>
        <label for="gender">Gender</label>
        <select id="gender">
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label for="phone">Contact Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number"required>
      </div>
      <div class="full-width">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Enter your address" required>
      </div>
      <div>
    <label for="category">Category</label>
    <select id="category">
      <option value="">Select Category</option>
      <option>Open</option>
      <option>OBC</option>
      <option>SC</option>
      <option>ST</option>
      <option>NT</option>
    </select>
  </div>
  <div>
    <label for="taluka">Taluka</label>
    <input type="text" id="taluka" placeholder="Enter your Taluka" required>
  </div>
  <div>
    <label for="district">District</label>
    <input type="text" id="district" placeholder="Enter your District" required>
  </div>
  <div>
    <label for="state">State</label>
    <input type="text" id="state" placeholder="Enter your State" required>
  </div>

      <div>
        <label for="studentid">Student ID</label>
        <input type="text" id="studentid" placeholder="College ID / Roll Number" required>
      </div>
      <div>
        <label for="stream">Stream</label>
        <select id="stream">
          <option value="">Select Stream</option>
          <option>Arts</option>
          <option>Commerce</option>
          <option>Science</option>
        </select>
      </div>
      <div>
        <label for="course">Course</label>
        <input type="text" id="course" placeholder="e.g. B.Sc Computer Science">
      </div>
      <div>
        <label for="year">Year</label>
        <select id="year">
          <option value="">Select Year</option>
          <option>FYJC</option>
          <option>SYJC</option>
          <option>First Year</option>
          <option>Second Year</option>
          <option>Third Year</option>
        </select>
      </div>

      <button type="submit">save</button>
    </form>
  </div>
  <div id="msg" role="status" aria-live="polite">
  <!-- default content (optional) -->
  Welcome!
  </div>


  <footer>
    © 2025 DigiPass | D.G. Ruparel College
  </footer>

  <!-- SCRIPT TO CONNECT BACKEND -->
  <script>
    document.getElementById("profileForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const formData = {
        name: document.getElementById("name").value,
        dob: document.getElementById("dob").value,
        gender: document.getElementById("gender").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        category: document.getElementById("category").value,
        taluka: document.getElementById("taluka").value,
        district: document.getElementById("district").value,
        state: document.getElementById("state").value,
        studentid: document.getElementById("studentid").value,
        stream: document.getElementById("stream").value,
        course: document.getElementById("course").value,
        year: document.getElementById("year").value
      };

      try {
        const res = await fetch("http://localhost:8000/api/profile", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formData)
        });

        const data = await res.json();
         document.getElementById("msg").innerText = data.message || "Profile saved!";
        <!-- alert(data.message || "Profile saved!"); -->
      } catch (err) {
        console.error(err);
         document.getElementById("msg").innerText = "Error saving data.";
      }
    });
  </script>

</body>
</html>
