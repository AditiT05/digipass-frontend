<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – DigiPass</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    /* Forgot Password Form */
    .container {
      max-width: 400px;
      margin: 100px auto;
      padding: 20px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f0f0f0, #d9d9d9); /* light grey gradient card */
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border: 1px solid #ccc;
      color: #333;
    }
    h1 {
      text-align: center;
      font-size: 2em;
      font-weight: bold;
      background: linear-gradient(90deg, #6a11cb, #2575fc); /* purple to blue gradient */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    button {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      color: #fff;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: linear-gradient(90deg, #5b0eb0, #1e63d0);
      transform: scale(1.02);
    }
    .options {
      text-align: center;
      margin-top: 10px;
    }
    .options a {
      color: #000; 
      text-decoration: none;
      font-weight: bold;
    }
    .options a:hover {
      text-decoration: underline;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background: #f8f8f8;
      border-top: 1px solid #ddd;
      font-size: 14px;
      margin-top: 100px;
    }
  </style>
</head>
<body>

  <!-- Forgot Password Form -->
  <div class="container">
    <h1>Forgot Password</h1>
    <form>
      <label for="email">Enter your registered email</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <button type="submit">Reset Password</button>
    </form>

    <div class="options">
      <p><a href="login.html">Back to Login</a></p>
    </div>
  </div>

  <script>
const form = document.querySelector('form');

form.addEventListener('submit', async (e) => {
  e.preventDefault(); // prevent page reload

  const email = document.getElementById('email').value;

  try {
    const res = await fetch('https://digipass-backend-yyvx.onrender.com/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json();
    alert(data.message); // show success or error message

  } catch (err) {
    console.error(err);
    alert("Something went wrong. Please try again!");
  }
});
</script>


  <!-- Footer -->
  <footer>
    © 2025 DigiPass | D.G. Ruparel College
  </footer>

</body>
</html>
