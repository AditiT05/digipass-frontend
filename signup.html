<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – DigiPass</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    /* Signup Form */
    .container {
      max-width: 400px;
      margin: 60px auto;
      padding: 20px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f0f0f0, #d9d9d9); /* light grey gradient */
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* subtle shadow for depth */
      border: 1px solid #ccc; /* soft border */
      color: #333; /* default text color */
    }
    h1 {
      text-align: center;
      font-size: 2.2em;
      font-weight: bold;
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      -webkit-background-clip: text;   /* Chrome/Safari */
      -webkit-text-fill-color: transparent;
      background-clip: text;           /* Firefox */
      color: transparent;
      margin-bottom: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    button {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      color: #fff;
      padding: 10px 30px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin: 15px auto;
    }
    button:hover {
      background: linear-gradient(90deg, #5b0eb0, #1e63d0);
      transform: scale(1.05);
    }

   
    /* Options */
    .options {
      text-align: center;
      margin-top: 10px;
    }
    .options a {
      color: #000;
      text-decoration: none;
      font-weight: bold;
    }
    .options a:hover {
      text-decoration: underline;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background: #f8f8f8;
      border-top: 1px solid #ddd;
      font-size: 14px;
      margin-top: 50px;
    }
  </style>
</head>
<body>
  <!-- Signup Form -->
  <div class="container">
    <h1>Create Account</h1>
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>

      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Re-enter your password" required>

      <button type="submit">Sign Up</button>
    </form>


    <!-- Options -->
    <div class="options">
      <p><a href="login.html">Already have an account? Login</a></p>
    </div>
  </div>

<script>
const form = document.querySelector('form');

form.addEventListener('submit', async (e) => {
  e.preventDefault(); // prevent page reload

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;

  // check if passwords match
  if (password !== confirmPassword) {
    alert("Passwords do not match!");
    return;
  }

  try {
    const res = await fetch('http://localhost:8000/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();
    console.log("Backend response:", data); // 👈 log the response
    alert(data.message);

    // ✅ Redirect on success (based on status OR message)
    if (res.ok || (data.message && data.message.toLowerCase().includes("success"))) {
      window.location.href = "login.html";
    }
  } catch (err) {
    console.error(err);
    alert("Something went wrong. Please try again.");
  }
});
   
</script>


  <!-- Footer -->
  <footer>
    © 2025 DigiPass | D.G. Ruparel College
  </footer>

</body>
</html>
