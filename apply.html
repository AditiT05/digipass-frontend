<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Concession – DigiPass</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #f8f8f8;
      border-bottom: 1px solid #ddd;
    }
    nav .logo {
      font-size: 20px;
      font-weight: bold;
      color: hsl(144, 71%, 3%);
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: #333;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    nav ul li a:hover {
      color: #2a5298;
    }

    /* Form Container */
    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    h1 {
      text-align: center;
      margin-bottom: 25px;
      /* Purple–blue gradient text */
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      /* For other browsers */
      background-clip: text;
      color: transparent;
    }
    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    label {
      font-weight: bold;
      margin-bottom: 5px;
      display: block;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .full-width {
      grid-column: span 2;
    }
    button {
    /* Purple–blue gradient background */
    background: linear-gradient(45deg, #6a11cb, #2575fc);
    color: #fff;
    padding: 10px 28px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 30px auto 0;
    display: block;
    font-weight: 600;
    transition: background 0.3s ease, transform 0.2s ease;
    /* Grid placement + centering */
    grid-column: 1 / -1;             /* span both columns */
    justify-self: center;            /* center horizontally inside spanned area */
    width: auto;     
    }

    button:hover {
      /* Slightly darker gradient on hover */
      background: linear-gradient(45deg, #5a0fb9, #1e63e5);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #f8f8f8;
      border-top: 1px solid #ddd;
      font-size: 14px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">🚆 DigiPass | Apply</div>
    <ul>
      <li><a href="student-dashboard.html">Dashboard</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
  </nav>

  <!-- Application Form -->
  <div class="container">
    <h1>Concession Application</h1>

    <form id="applyForm">

      <div>
        <label for="from">From Station</label>
        <input type="text" id="from" placeholder="Enter starting station" required>
      </div>
      <div>
        <label for="to">To Station</label>
        <input type="text" id="to" placeholder="Enter destination station" required>
      </div>
      <div class="full-width">
        <label for="route">Route</label>
        <input type="text" id="route" placeholder="e.g. Via Dadar">
      </div>
      <div class="full-width">
      <label for="railway">Railway</label>
      <select id="railway">
        <option value="">Select Railway</option>
        <option>Central</option>
        <option>Western</option>
      </select>
    </div>
      <div>
        <label for="pass-type">Pass Type</label>
        <select id="pass-type">
          <option value="">Select</option>
          <option>Monthly</option>
          <option>Quarterly</option>
        </select>
      </div>
      <div>
        <label for="class">Class</label>
        <select id="class">
          <option value="">Select</option>
          <option>First Class</option>
          <option>Second Class</option>
        </select>
      </div>
      <div>
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter your age" required>
      </div>
      <div>
        <label for="start-date">Pass Start Date</label>
        <input type="date" id="start-date" required>
      </div>

      <button type="submit">Submit Application</button>
    </form>
  </div>
  
  <div id="msg" role="status" aria-live="polite">
  <!-- default content (optional) -->
  Welcome!
  </div>

  <footer>
    © 2025 DigiPass | D.G. Ruparel College
  </footer>

<script>
  document.getElementById("applyForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    // Collect form data
    const formData = {
      from: document.getElementById("from").value,
      to: document.getElementById("to").value,
      route: document.getElementById("route").value,
      railway: document.getElementById("railway").value,
      passType: document.getElementById("pass-type").value,
      classType: document.getElementById("class").value,
      age: document.getElementById("age").value,
      startDate: document.getElementById("start-date").value
    };

    try {
      const res = await fetch("https://digipass-backend-yyvx.onrender.com/api/application", {
        method: 'POST',
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      });
      

      const data = await res.json();
      document.getElementById("msg").innerText = data.message || "application saved!";
      <!-- alert(data.message || "application saved!"); --> 
    } catch (err) {
      console.error (err);
      document.getElementById("msg").innerText = "Error saving data.";
    }
  });
</script>

</body>
</html>
