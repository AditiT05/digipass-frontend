<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – DigiPass</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #333;
      background: linear-gradient(135deg, #f0f0f0, #d9d9d9);
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #f8f8f8;
      border-bottom: 1px solid #ddd;
    }
    nav .logo {
      font-size: 30px;
      font-weight: bold;
      color: hsl(144, 71%, 3%);
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: #333;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    nav ul li a:hover {
      color: #2a5298;
    }

    /* Dashboard */
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;       
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      padding: 30px;
      transition: 0.3s;
      background: linear-gradient(135deg, #f7f7f7 0%, #ffffff 100%);
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
      transition: 0.3s ease;
    }
    .card:hover {
      background: linear-gradient(135deg, #ececec 0%, #ffffff 100%);
      border-color: #2a5298;
      transform: translateY(-4px);
    }
    .card h2 {
      margin-bottom: 15px;
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-fill-color: transparent;
      font-size: 22px;
      font-weight: bold;
    }
    .card p {
      color: #444;
      line-height: 1.4;
    }

    .card a {
      display: inline-block;
      margin-top: 15px;
      /* Purple–blue gradient background */
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: #fff;
      padding: 10px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .card a:hover {
      background: linear-gradient(45deg, #5a0fb9, #1e63e5); /* darker hover */
      transform: translateY(-2px);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background: #f8f8f8;
      border-top: 1px solid #ddd;
      font-size: 14px;
      margin-top: 150px;
    }

    /* Responsive for tablets & phones */
    @media (max-width: 1000px) {
    .cards {
    grid-template-columns: repeat(2, 1fr); /* 2 per row */
    }
    }

    @media (max-width: 700px) {
    .cards {
    grid-template-columns: 1fr; /* stack in one column */
    }
    }
    
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">🚆 Admin Dashboard</div>
    <ul>
      <li><a href="admin-dashboard.html">Home</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
  </nav>

  <!-- Dashboard Content -->
  <div class="container">
    <div class="cards">
      <div class="card">
        <h2>Profile</h2>
        <p>View  your admin account details.</p>
        <a href="admin-profile.html"> Profile</a>
      </div>
      <div class="card">
        <h2>Verify Applications</h2>
        <p>Review student profile applications.</p>
        <a href="verify.html">Verify</a>
      </div>
      <div class="card">
        <h2>Approved Applications</h2>
        <p>View all applications.</p>
        <a href="approved.html">View</a>
      </div>
    
    </div>
  </div>

  <!-- Footer -->
  <footer>
    © 2025 DigiPass | D.G. Ruparel College
  </footer>

</body>
</html>
